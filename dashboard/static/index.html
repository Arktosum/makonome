<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Makonome</title>
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body>
    <!-- TOPBAR -->
    <div class="topbar">
      <div style="display: flex; align-items: baseline; gap: 0">
        <span class="logo">MAKO</span>
        <span class="logo-sub">NEURAL INTERFACE</span>
      </div>
      <div class="topbar-right">
        <div class="status">
          <div class="status-dot" id="status-dot"></div>
          <span class="status-text" id="status-text">CONNECTING</span>
        </div>
        <div class="stats">
          <div class="stat">
            <div
              class="stat-val"
              style="color: #00ff88; transition: transform 0.2s"
              id="stat-msg"
            >
              0
            </div>
            <div class="stat-lbl">MSG</div>
          </div>
          <div class="stat">
            <div
              class="stat-val"
              style="color: #ffaa00; transition: transform 0.2s"
              id="stat-tools"
            >
              0
            </div>
            <div class="stat-lbl">TOOLS</div>
          </div>
          <div class="stat">
            <div
              class="stat-val"
              style="color: #00ddcc; transition: transform 0.2s"
              id="stat-mem"
            >
              0
            </div>
            <div class="stat-lbl">MEM</div>
          </div>
        </div>
        <button class="toggle-btn" id="clear-btn" onclick="clearMemories()">
          ⊘ CLEAR MEM
        </button>
        <button class="toggle-btn" id="toggle-btn">◈ ACTIVITY</button>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main">
      <!-- CHAT -->
      <div class="chat-area" id="chat-area">
        <div class="messages" id="messages"></div>
        <div class="input-bar">
          <textarea
            id="msg-input"
            rows="1"
            placeholder="Talk to Mako..."
          ></textarea>
          <button class="icon-btn mic-btn" id="mic-btn">🎤</button>
          <button class="icon-btn send-btn" id="send-btn">➤</button>
        </div>
      </div>

      <!-- ACTIVITY PANEL -->
      <div class="activity-panel" id="activity-panel">
        <div class="panel-tabs">
          <div
            class="tab active"
            data-tab="feed"
            onclick="Activity.switchTab('feed')"
          >
            EVENTS
          </div>
          <div
            class="tab"
            data-tab="neural"
            onclick="Activity.switchTab('neural')"
          >
            NEURAL MAP
          </div>
        </div>
        <div class="tab-content active" id="tab-feed">
          <div id="event-feed"></div>
        </div>
        <div class="tab-content" id="tab-neural">
          <svg
            id="neural-svg"
            viewBox="0 0 100 100"
            style="width: 100%; padding: 20px"
          ></svg>
        </div>
      </div>
    </div>

    <!-- PROMPT INSPECTOR MODAL -->
    <div class="inspector-overlay" id="inspector-overlay">
      <div class="inspector-modal">
        <div class="inspector-header">
          <div class="inspector-title">⬡ PROMPT INSPECTOR</div>
          <div class="inspector-meta">
            <div class="inspector-total" id="inspector-total"></div>
            <button class="inspector-close" id="inspector-close">✕</button>
          </div>
        </div>
        <div class="token-bar" id="token-bar"></div>
        <div class="inspector-body" id="inspector-body"></div>
        <div class="inspector-hint">
          CLICK HEADER TO COLLAPSE · ESC TO CLOSE
        </div>
      </div>
    </div>

    <script src="/js/ws.js"></script>
    <script src="/js/stats.js"></script>
    <script src="/js/activity.js"></script>
    <script src="/js/chat.js"></script>
    <script src="/js/voice.js"></script>

    <script>
      // ── PROMPT INSPECTOR ────────────────────────────────────────────
      const Inspector = (() => {
        const _store = {};

        const BAR_COLORS = {
          blue: "#3b82f6",
          purple: "#a855f7",
          green: "#22c55e",
          amber: "#f59e0b",
          cyan: "#06b6d4",
          red: "#ef4444",
        };

        function _tok(text) {
          return Math.max(
            1,
            Math.round((text || "").split(/\s+/).filter(Boolean).length * 1.3),
          );
        }

        function store(key, data) {
          _store[key] = data;
        }

        function open(key) {
          const data = _store[key];
          if (!data) {
            console.warn("[Inspector] no data for", key);
            return;
          }

          const sections = (data.sections || []).map((s) => ({
            ...s,
            tokens: _tok(s.text),
          }));
          const total = sections.reduce((a, s) => a + s.tokens, 0);

          // token bar
          const bar = document.getElementById("token-bar");
          bar.innerHTML = sections
            .map((s) => {
              const w = total > 0 ? ((s.tokens / total) * 100).toFixed(2) : 0;
              return `<div class="token-seg" style="width:${w}%;background:${BAR_COLORS[s.color] || "#fff"}"></div>`;
            })
            .join("");

          // total display
          document.getElementById("inspector-total").innerHTML =
            `TOTAL <span>${total.toLocaleString()}</span> TOKENS`;

          // sections
          const body = document.getElementById("inspector-body");
          body.innerHTML = "";
          sections.forEach((s, i) => {
            const pct = total > 0 ? ((s.tokens / total) * 100).toFixed(1) : 0;
            const div = document.createElement("div");
            div.className = `prompt-section s-${s.color}`;
            div.innerHTML = `
        <div class="section-hdr" onclick="Inspector.toggle(${i})">
          <div class="section-hdr-left">
            <div class="section-dot"></div>
            <span>${s.label}</span>
          </div>
          <div class="section-info">
            <span class="section-tokens">${s.tokens.toLocaleString()} tok</span>
            <span class="section-pct">${pct}%</span>
            <span class="section-chev open" id="chev-${i}">▼</span>
          </div>
        </div>
        <div class="section-body" id="sbody-${i}">${esc(s.text)}</div>`;
            body.appendChild(div);
          });

          document.getElementById("inspector-overlay").classList.add("open");
        }

        function toggle(i) {
          const b = document.getElementById(`sbody-${i}`);
          const c = document.getElementById(`chev-${i}`);
          const open = b.style.display !== "none";
          b.style.display = open ? "none" : "block";
          c.classList.toggle("open", !open);
        }

        function close() {
          document.getElementById("inspector-overlay").classList.remove("open");
        }

        function esc(t) {
          return String(t || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        function hasData(key) {
          return !!_store[key];
        }

        return { store, open, toggle, close, hasData };
      })();

      // close on backdrop / ESC
      document
        .getElementById("inspector-overlay")
        .addEventListener("click", (e) => {
          if (e.target === e.currentTarget) Inspector.close();
        });
      document
        .getElementById("inspector-close")
        .addEventListener("click", Inspector.close);
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") Inspector.close();
      });

      // ── MAIN ────────────────────────────────────────────────────────
      document.addEventListener("DOMContentLoaded", () => {
        let _lastUserMsg = null;

        // ── WS EVENTS ──────────────────────────────────────────────
        WS.on("message", (event) => {
          if (event.data?.role === "user") return;

          if (event.data?.role === "assistant") {
            Chat.removeThinking();
            const time = new Date().toLocaleTimeString("en-US", {
              hour: "2-digit",
              minute: "2-digit",
              second: "2-digit",
            });
            const bubble = Chat.addBubble("mako", event.data.content, time);

            // wire up inspector click
            if (bubble && _lastUserMsg) {
              bubble.classList.add("clickable");
              // check after short delay to allow prompt_debug to arrive first
              setTimeout(() => {
                if (Inspector.hasData(_lastUserMsg)) {
                  const key = _lastUserMsg;
                  bubble.addEventListener("click", () => Inspector.open(key));
                }
              }, 500);
            }

            Chat.setInputEnabled(true);
            Stats.update("message");
          }

          Activity.addEvent(event);
          Activity.setActiveNodes(Activity.activeNodesFor(event));
        });

        WS.on("prompt_debug", (event) => {
          if (event.data?.user_message) {
            Inspector.store(event.data.user_message, event.data);
          }
        });

        WS.on("thought", (event) => {
          Chat.updateThinking(event.data?.content);
          Activity.addEvent(event);
          Activity.setActiveNodes(Activity.activeNodesFor(event));
        });

        WS.on("tool_call", (event) => {
          Activity.addEvent(event);
          Activity.setActiveNodes(Activity.activeNodesFor(event));
          Stats.update("tool_call");
        });

        WS.on("tool_result", (event) => {
          Activity.addEvent(event);
          Activity.setActiveNodes(Activity.activeNodesFor(event));
        });

        WS.on("memory", (event) => {
          Activity.addEvent(event);
          Activity.setActiveNodes(Activity.activeNodesFor(event));
          Stats.update("memory");
        });

        WS.on("connected", () => {
          document.getElementById("status-dot").className = "status-dot active";
          document.getElementById("status-text").textContent = "ONLINE";
        });

        WS.on("disconnected", () => {
          document.getElementById("status-dot").className = "status-dot";
          document.getElementById("status-text").textContent = "RECONNECTING";
          Chat.removeThinking();
          Chat.setInputEnabled(true);
        });

        // ── SEND MESSAGE ───────────────────────────────────────────
        function sendMessage() {
          const input = document.getElementById("msg-input");
          const text = input.value.trim();
          if (!text) return;
          input.value = "";
          input.style.height = "auto";
          _lastUserMsg = text;

          const time = new Date().toLocaleTimeString("en-US", {
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
          });
          Chat.addBubble("user", text, time);
          Chat.showThinking();
          Chat.setInputEnabled(false);
          WS.send({ type: "user_message", content: text });
        }

        document
          .getElementById("send-btn")
          .addEventListener("click", sendMessage);
        document
          .getElementById("mic-btn")
          .addEventListener("click", () => Voice.toggle());
        document
          .getElementById("toggle-btn")
          .addEventListener("click", () => Activity.togglePanel());

        document
          .getElementById("msg-input")
          .addEventListener("input", function () {
            this.style.height = "auto";
            this.style.height = Math.min(this.scrollHeight, 120) + "px";
          });

        document
          .getElementById("msg-input")
          .addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
              e.preventDefault();
              sendMessage();
            }
          });

        Voice.init((transcript) => {
          document.getElementById("msg-input").value = transcript;
          sendMessage();
        });

        // ── CLEAR MEMORIES ───────────────────────────────────
        window.clearMemories = async function () {
          if (!confirm("Clear ALL memories? This cannot be undone.")) return;
          const btn = document.getElementById("clear-btn");
          btn.textContent = "⊘ CLEARING...";
          btn.disabled = true;
          try {
            const res = await fetch("/api/clear-memories", { method: "POST" });
            const data = await res.json();
            if (data.ok) {
              btn.textContent = "⊘ CLEARED";
              btn.style.color = "var(--glow)";
              btn.style.borderColor = "var(--glow)";
              setTimeout(() => {
                btn.textContent = "⊘ CLEAR MEM";
                btn.style.color = "";
                btn.style.borderColor = "";
                btn.disabled = false;
              }, 2000);
            } else {
              btn.textContent = "⊘ FAILED";
              btn.style.color = "var(--red)";
              setTimeout(() => {
                btn.textContent = "⊘ CLEAR MEM";
                btn.style.color = "";
                btn.disabled = false;
              }, 2000);
            }
          } catch (e) {
            btn.textContent = "⊘ ERROR";
            setTimeout(() => {
              btn.textContent = "⊘ CLEAR MEM";
              btn.disabled = false;
            }, 2000);
          }
        };

        Activity.buildMap();
        Activity.setActiveNodes(["brain"]);
        WS.connect();
      });
    </script>
  </body>
</html>
